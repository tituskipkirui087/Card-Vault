    <meta property="og:image:alt" content="CardVault - Premium Credit Cards, Bank Logs, Linkable CCs & Tools" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />

    <meta property="twitter:image" content="https://carding-bank-logs-linkable-ccs.vercel.app/cardvault-og.jpg" />
    
    <!-- WhatsApp / Zangi / Messaging Apps -->
    <meta property="og:image:alt" content="CardVault Store - Premium Digital Products" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Description -->
    <meta name="description" content="CardVault Store - Secure source for premium digital assets. Cards, CCs, Bank Logs, Accounts, Tools. 24/7 support via Telegram. Full instructions included." />
    
    <!-- Keywords -->
    <meta name="keywords" content="card vault, credit cards, linkable cc, bank logs, paypal accounts, card checker, vpn, proxy, hacking tools, pentesting tools" />
    
    <!-- Disable Right-Click Context Menu -->
    <script>
      document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
      }, false);
    </script>
    
    <!-- Disable Source Code Access (Ctrl+U, Ctrl+S, Ctrl+Shift+I, F12, etc.) -->
    <script>
      document.addEventListener('keydown', function(e) {
        // Prevent Ctrl+U (View Source)
        if (e.ctrlKey && e.key === 'u') {
          e.preventDefault();
          return false;
        }
        // Prevent Ctrl+S (Save Page)
        if (e.ctrlKey && e.key === 's') {
          e.preventDefault();
          return false;
        }
        // Prevent Ctrl+Shift+I (Developer Tools)
        if (e.ctrlKey && e.shiftKey && e.key === 'I') {
          e.preventDefault();
          return false;
        }
        // Prevent F12 (Developer Tools)
        if (e.key === 'F12') {
          e.preventDefault();
          return false;
        }
        // Prevent Ctrl+Shift+J (Console)
        if (e.ctrlKey && e.shiftKey && e.key === 'J') {
          e.preventDefault();
          return false;
        }
        // Prevent Ctrl+P (Print)
        if (e.ctrlKey && e.key === 'p') {
          e.preventDefault();
          return false;
        }
        // Prevent Ctrl+A (Select All) - but allow in input fields
        if (e.ctrlKey && e.key === 'a') {
          const tag = e.target.tagName.toLowerCase();
          if (!['input', 'textarea'].includes(tag)) {
            e.preventDefault();
            return false;
          }
        }
      }, false);
    </script>
    
    <!-- Disable Text Selection and Copying -->
    <script>
      // Prevent text selection
      document.addEventListener('selectstart', function(e) {
        e.preventDefault();
      }, false);
      
      // Prevent copy
      document.addEventListener('copy', function(e) {
        e.preventDefault();
        return false;
      }, false);
      
      // Prevent cut
      document.addEventListener('cut', function(e) {
        e.preventDefault();
        return false;
      }, false);
      
      // Prevent paste
      document.addEventListener('paste', function(e) {
        e.preventDefault();
        return false;
      }, false);
    </script>
    

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
