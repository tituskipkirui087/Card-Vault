<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Card Icon -->
  <rect x="100" y="165" width="300" height="190" rx="20" fill="url(#accent)" opacity="0.9"/>
  <rect x="120" y="185" width="260" height="30" rx="5" fill="#1a1a2e" opacity="0.5"/>
  <rect x="120" y="235" width="180" height="25" rx="5" fill="#1a1a2e" opacity="0.5"/>
  <rect x="120" y="280" width="100" height="20" rx="5" fill="#1a1a2e" opacity="0.5"/>
  
  <!-- Title -->
  <text x="500" y="280" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff">CardVault</text>
  <text x="500" y="350" font-family="Arial, sans-serif" font-size="36" fill="#22c55e">Premium Digital Products</text>
  
  <!-- Features -->
  <text x="500" y="420" font-family="Arial, sans-serif" font-size="28" fill="#cccccc">✓ Credit Cards</text>
  <text x="500" y="470" font-family="Arial, sans-serif" font-size="28" fill="#cccccc">✓ Bank Logs</text>
  <text x="500" y="520" font-family="Arial, sans-serif" font-size="28" fill="#cccccc">✓ Premium Tools</text>
  
  <!-- CTA -->
  <rect x="500" y="560" width="200" height="50" rx="25" fill="#22c55e"/>
  <text x="600" y="595" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Shop Now</text>
  
  <!-- Border -->
  <rect x="10" y="10" width="1180" height="610" rx="15" fill="none" stroke="#22c55e" stroke-width="4"/>
</svg>